name: Check FRUS researched-volume status

on:
  workflow_dispatch:
  schedule:
    - cron: "17 12 * * *"

jobs:
  check-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/check-status.mjs
